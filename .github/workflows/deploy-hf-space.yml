name: Deploy to HuggingFace Space

# Pushes repo contents to the HuggingFace Space via the huggingface_hub upload API.
# Uses upload_folder (not git push) so LFS is handled automatically and any
# historical divergence on the HF side is overwritten cleanly.
#
# REQUIRES: repo secret HF_TOKEN with Write access.

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'models.py'
      - 'openenv.yaml'
      - 'v3_arcadia/**'
      - 'README.md'
      - 'MODEL_CARD.md'
      - 'RESULTS.md'
      - 'FINAL_DEMO.md'
      - 'BENCHMARKS_VS_PUBLIC.md'
      - 'PYTORCH_STORY.md'
      - 'comparison.md'
      - 'Dockerfile*'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'tests/**'
      - 'scripts/**'
      - 'demo/**'
      - 'challenges/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install -U "huggingface_hub>=0.25"

      - name: Upload to HF Space (skips _dump, .git, .github, large notebooks)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os, sys
          from huggingface_hub import HfApi
          token = os.environ.get("HF_TOKEN")
          if not token:
              print("ERROR: HF_TOKEN is empty")
              sys.exit(1)
          api = HfApi(token=token)
          api.upload_folder(
              folder_path=".",
              repo_id="Shaurya-Noodle/Supplymind",
              repo_type="space",
              commit_message="Deploy v3.0-arcadia from GitHub main",
              ignore_patterns=[
                  ".git/**",
                  ".github/**",
                  "_dump/**",
                  "*.pyc",
                  "__pycache__/**",
                  ".pytest_cache/**",
                  ".venv/**",
                  "venv/**",
                  "catboost_info/**",
                  "notebooks/**",
                  "models/**",
                  "external_data/**",
                  "rl/checkpoints/**",
                  "rl/data/dataco.csv",
                  "v3_arcadia/logs/**",
                  "plots/v3/**.npy",
              ],
          )
          print("HF Space upload complete.")
          PY

      - name: Smoke test
        if: success()
        run: |
          sleep 45
          curl -fsS https://shaurya-noodle-supplymind.hf.space/health || \
            echo "WARN: health check returned non-200 (Space may still be rebuilding)"
