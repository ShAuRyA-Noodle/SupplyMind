version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEMO_MODE=true
      - OFFLINE_MODE=true
    volumes:
      - ./rl/checkpoints:/app/rl/checkpoints:ro
      - ./rl/data:/app/rl/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    environment:
      - DEMO_MODE=true
      - OFFLINE_MODE=true
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./rl/checkpoints:/app/rl/checkpoints:ro
      - ./rl/data:/app/rl/data:ro

  # v3 Damocles API — /assess, /forecast, /rag, /rl/act, /health
  damocles:
    build:
      context: .
      dockerfile: Dockerfile.damocles
    ports:
      - "8765:8765"
    environment:
      - DEMO_MODE=true
    volumes:
      - ./v3_arcadia/checkpoints/granite:/app/v3_arcadia/checkpoints/granite:ro
      - ./v3_arcadia/checkpoints/gethsemane:/app/v3_arcadia/checkpoints/gethsemane:ro
      - ./models/mxbai-embed-large:/app/models/mxbai-embed-large:ro
      - ./models/chronos-bolt-base:/app/models/chronos-bolt-base:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
